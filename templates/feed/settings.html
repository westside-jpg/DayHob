{% extends "feed/base.html" %}

{% block title %}Настройки{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/feed/css/settings.css">
{% endblock %}

{% block content %}

<div class="settings-container">
    <p class="s-title">Настройки</p>
    <div class="s-bio">
        <p>Био</p>
        <textarea maxlength="150" placeholder="Расскажите о себе... (максимум 150 символов)" id="bio">{{ current_user.bio or '' }}</textarea>
        <p class="error" style="display:none"></p>
    </div>
    <div class="s-avatar">
        <p>Аватар</p>
        <div class="s-avatar-container">
            <img src="{{ current_user.avatar_url or '/static/feed/images/default_avatar.svg' }}" alt="" class="s-avatar-image" id="current-avatar">
            <img src="/static/feed/images/arrow.svg" alt="" class="arrow" id="arrow" style="display:none">
            <img src="" alt="" class="s-avatar-image" id="preview-avatar" style="display:none">
        </div>
        <input type="file" id="avatar-input" style="display:none">
        <button onclick="document.getElementById('avatar-input').click()">Выбрать фото</button>
    </div>
</div>
<div class="s-apply-container">
    <button class="s-apply" id="apply-changes" data-username="{{ current_user.username }}">Применить настройки</button>
</div>
<div id="crop-modal" style="display:none">
    <div class="crop-wrapper">
        <img id="crop-image">
        <button id="crop-confirm">Обрезать</button>
    </div>
</div>

{% endblock %}

{% block scripts %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="/static/feed/js/avatar-catch.js"></script>
{% endblock %}
