<div class="posts" id="posts-section">
    {% for post in posts %}
    <div class="post-wrapper" data-post-id="{{ post.id }}">
        <div class="post">
            <div class="post-header">
                <a href="/profile/{{ post.author_username }}">
                    <img class="post-avatar" src="{{ post.author_avatar or '/static/feed/images/default_avatar.svg' }}" alt="">
                </a>
                <div class="post-user-info">
                    <a href="/profile/{{ post.author_username }}">
                        <p class="post-username">{{ post.author_username }}</p>
                    </a>
                    <p class="post-time">{{ post.created_at }} </p>
                </div>
                <div class="post-info">
                    <p class="post-info-btn">i</p>
                    <div class="post-tooltip">
                        {{ post.task_title }}
                    </div>
                </div>
            </div>
            {% if post.image_url %}
                <img class="post-image" src="{{ post.image_url }}" alt="">
            {% endif %}
            {% if post.text %}
                <p class="post-text">{{ post.text }}</p>
            {% endif %}
        </div>
        {% if is_own_profile %}
        <div class="post-tools">
            <p>...</p>
            <div class="tools-container">
                <div class="tools-element danger">
                    <img src="/static/feed/images/trash.svg">
                    <button class="tool-btn danger">Удалить пост</button>
                </div>
            </div>
        </div>
        {% endif %}
        <div class="post-footer">
            <div class="like {% if post.is_liked %} liked {% endif %}" data-post-id="{{ post.id }}">
                <img src="{% if post.is_liked %} /static/feed/images/like-filled.svg {% else %} /static/feed/images/like.svg {% endif %}" class="like-icon">
                <p>{{ post.likes_count }}</p>
            </div>
            <div class="comment" data-post-id="{{ post.id }}">
                <img src="/static/feed/images/comment.svg" alt="" class="comment-icon">
                <p>{{ post.comments_count }}</p>
            </div>
        </div>
        <div class="comments-section">
            <div class="comments-list">
            </div>
            <div class="comment-input-row">
                    <img class="comment-avatar" src="{{ current_user.avatar_url or '/static/feed/images/default_avatar.svg' }}" alt="">
                    <textarea id="text" maxlength="500" class="comment-input" placeholder="Написать комментарий..." rows="1"></textarea>
                    <button class="comment-send-btn">
                        <img src="/static/feed/images/send-comment.svg" alt="">
                    </button>
            </div>
            <p class="error" style="display:none"></p>
        </div>
    </div>
    {% endfor %}
</div>
